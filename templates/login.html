<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;

    background:linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{

    background:white;

    padding:40px;

    width:350px;

    border-radius:10px;

    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    text-align:center;
}

.container h2{

    margin-bottom:20px;
}

input{

    width:100%;
    padding:12px;

    margin:10px 0;

    border-radius:5px;

    border:1px solid #ccc;

    font-size:14px;
}

button{

    width:100%;

    padding:12px;

    background:#667eea;

    border:none;

    color:white;

    font-size:16px;

    border-radius:5px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:#5a67d8;
}

p{

    margin-top:15px;
}

a{

    color:#667eea;

    text-decoration:none;

    font-weight:bold;
}

a:hover{

    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?</p>

<a href="/register">Create Account</a>

</div>

</body>
</html>
