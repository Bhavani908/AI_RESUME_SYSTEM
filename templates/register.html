<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(120deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:10px;
            width:300px;
            text-align:center;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#4facfe;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#2c8be6;
        }

        a{
            text-decoration:none;
            color:#4facfe;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<br>

<p>Already have account?</p>
<a href="/login">Login</a>

</div>

</body>
</html>
